name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.26"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Install stringer
        run: go install golang.org/x/tools/cmd/stringer@v0.42.0

      - name: Generate
        run: go generate ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./... -v

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.26"

      - name: Install stringer
        run: go install golang.org/x/tools/cmd/stringer@v0.42.0

      - name: Generate
        run: go generate ./...

      - name: Run go vet
        run: go vet ./...

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.9.0

      - name: Run golangci-lint
        run: golangci-lint run --new-from-rev=origin/main ./...

  e2e:
    needs: [test, lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.26"

      - name: Install stringer
        run: go install golang.org/x/tools/cmd/stringer@v0.42.0

      - name: Generate
        run: go generate ./...

      - name: Install meow
        run: go install ./cmd/meow

      - name: Run hello.nyan
        run: |
          output=$(meow run examples/hello.nyan)
          echo "$output"
          [ "$output" = "Hello, Tama!" ] || exit 1

      - name: Run fibonacci.nyan
        run: meow run examples/fibonacci.nyan

      - name: Run fizzbuzz.nyan
        run: meow run examples/fizzbuzz.nyan

      - name: Run list_ops.nyan
        run: meow run examples/list_ops.nyan
