name: Feature Request
description: Suggest a new feature or improvement for Meow
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe your idea below.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve? Is it related to a frustration?
      placeholder: "I want to ... but currently ..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would this feature work? Include example `.nyan` syntax if applicable.
      placeholder: |
        ```
        # Example syntax
        meow greet(name) {
          bring "Hello, " + name
        }
        ```
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or workarounds you've considered.

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of Meow does this affect?
      options:
        - Language syntax / keywords
        - Compiler / codegen
        - Runtime (meowrt)
        - Standard library (file, http, etc.)
        - CLI (meow command)
        - Playground
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, mockups, or references.
