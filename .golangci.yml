version: "2"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - gocritic
    - misspell

  settings:
    errcheck:
      exclude-functions:
        - (*os.File).Close
        - (io.Closer).Close
        - (*net/http.Response).Body.Close
        - (*bytes.Buffer).ReadFrom
        - os.RemoveAll
        - os.Remove
        - (net/http.ResponseWriter).Write
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - (*os.Process).Kill
    govet:
      enable-all: true
      disable:
        - fieldalignment
    gocritic:
      enabled-tags:
        - diagnostic
        - style
    misspell:
      locale: US

formatters:
  enable:
    - gofmt
    - goimports

issues:
  exclude-dirs:
    - testdata
    - playground
  max-issues-per-linter: 50
  max-same-issues: 3

run:
  timeout: 5m
