version: "2"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - gocritic
    - misspell

  settings:
    govet:
      enable-all: true
      disable:
        - fieldalignment
    gocritic:
      enabled-tags:
        - diagnostic
        - style
    misspell:
      locale: US

formatters:
  enable:
    - gofmt
    - goimports

issues:
  exclude-dirs:
    - testdata
    - playground
  max-issues-per-linter: 50
  max-same-issues: 3

run:
  timeout: 5m
