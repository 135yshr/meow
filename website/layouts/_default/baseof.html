<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if not .IsHome }}{{ .Title }} - {{ end }}{{ .Site.Title }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <link rel="canonical" href="{{ .Permalink }}">
  {{ partial "ogp.html" . }}
  {{ partial "jsonld.html" . }}
  <link rel="icon" href="{{ "favicon.svg" | relURL }}" type="image/svg+xml">
  <style>
    :root{--color-primary:#6c5ce7;--color-primary-light:#a29bfe;--color-bg:#fff;--color-bg-hero:#1a1a2e;--color-text:#2d3436;--color-text-inverse:#fff;--color-border:#dfe6e9;--font-sans:system-ui,-apple-system,"Segoe UI","Noto Sans","Helvetica Neue",Arial,sans-serif;--font-mono:ui-monospace,"Cascadia Code","Source Code Pro",Menlo,Consolas,monospace;--radius:8px;--container-width:1200px}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--font-sans);font-size:16px;line-height:1.6;color:var(--color-text);background:var(--color-bg)}
    .container{max-width:var(--container-width);margin:0 auto;padding:0 1.5rem}
    .site-header{position:sticky;top:0;z-index:100;background:var(--color-bg);border-bottom:1px solid var(--color-border)}
    .nav-container{display:flex;align-items:center;height:3.5rem;gap:2rem}
    .nav-logo{display:flex;align-items:center;gap:.5rem;font-weight:700;font-size:1.2rem;color:var(--color-text);text-decoration:none}
    .nav-links{display:flex;list-style:none;gap:.25rem;flex:1}
    .hero{background:var(--color-bg-hero);color:var(--color-text-inverse);padding:4rem 0 5rem;overflow:hidden}
    .hero-content{display:grid;grid-template-columns:1fr 1.1fr;gap:3rem;align-items:center}
    .hero h1{font-size:3.5rem;font-weight:700;letter-spacing:-.02em;margin-bottom:.5rem}
  </style>
  <link rel="stylesheet" href="{{ "css/style.css" | relURL }}" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="{{ "css/style.css" | relURL }}"></noscript>
  {{ if hugo.IsProduction }}
    <link rel="stylesheet" href="{{ "css/consent.css" | relURL }}" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="{{ "css/consent.css" | relURL }}"></noscript>
    <script defer src="{{ "js/consent.js" | relURL }}"></script>
    <script defer src="https://www.googletagmanager.com/gtag/js?id={{ site.Config.Services.GoogleAnalytics.ID }}"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', '{{ site.Config.Services.GoogleAnalytics.ID }}', { send_page_view: false });
    </script>
  {{ end }}
</head>
<body>
  {{ if hugo.IsProduction }}{{ partial "consent-banner.html" . }}{{ end }}
  {{ partial "header.html" . }}
  <main>
    {{ block "main" . }}{{ end }}
  </main>
  {{ partial "footer.html" . }}
  <script defer src="{{ "js/main.js" | relURL }}"></script>
</body>
</html>
